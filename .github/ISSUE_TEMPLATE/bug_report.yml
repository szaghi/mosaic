name: Bug report
description: Something is not working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.
        Please fill in all required fields so we can reproduce the issue quickly.

  - type: input
    id: version
    attributes:
      label: MOSAIC version
      description: Run `mosaic --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Run `python --version`
      placeholder: "3.12.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04 / macOS 14 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command that triggered the bug
      description: The exact command you ran, including all flags.
      render: shell
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Full terminal output
      description: Paste the complete output, including any tracebacks.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might be relevant (config file, source in use, etc.).
