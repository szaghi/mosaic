name: Feature request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please check
        [open issues](https://github.com/szaghi/mosaic/issues) and
        [discussions](https://github.com/szaghi/mosaic/discussions)
        to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: >
        Describe the use case or problem this feature would solve.
        Explaining *why* you need something helps design the right interface.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like MOSAIC to do? Include CLI flags, config keys, or API sketches if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you have already tried or thought about.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, links, or any other relevant information.
