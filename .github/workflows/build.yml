name: Build Executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:

  build:
    name: Build (${{ matrix.artifact }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: MOSAIC-macOS-arm64
          - os: ubuntu-latest
            artifact: MOSAIC-Linux
          - os: windows-latest
            artifact: MOSAIC-Windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[ui,dev]"

      - name: Build with PyInstaller
        run: pyinstaller mosaic.spec

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r -y ../${{ matrix.artifact }}.zip MOSAIC.app

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar czf ${{ matrix.artifact }}.tar.gz -C dist MOSAIC

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\MOSAIC -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            MOSAIC-macOS-arm64/MOSAIC-macOS-arm64.zip
            MOSAIC-Linux/MOSAIC-Linux.tar.gz
            MOSAIC-Windows/MOSAIC-Windows.zip
