name: Build Executables

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build:
    name: Build (${{ matrix.artifact }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: MOSAIC-macOS-arm64
          - os: ubuntu-latest
            artifact: MOSAIC-Linux
          - os: windows-latest
            artifact: MOSAIC-Windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[desktop,dev]"

      - name: Build with PyInstaller
        run: pyinstaller mosaic.spec

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r -y ../${{ matrix.artifact }}.zip MOSAIC.app

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar czf ${{ matrix.artifact }}.tar.gz -C dist MOSAIC

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\MOSAIC -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            MOSAIC-macOS-arm64/MOSAIC-macOS-arm64.zip
            MOSAIC-Linux/MOSAIC-Linux.tar.gz
            MOSAIC-Windows/MOSAIC-Windows.zip

  update-release:
    name: Refresh latest release assets
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Replace assets on latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          TAG=$(gh release list --repo "$REPO" --limit 1 --json tagName -q '.[0].tagName')
          echo "Updating assets on release $TAG"
          # Delete existing assets explicitly — gh release upload --clobber races
          # against the GitHub API and produces HTTP 422 "already exists".
          for name in MOSAIC-macOS-arm64.zip MOSAIC-Linux.tar.gz MOSAIC-Windows.zip; do
            id=$(gh api "repos/$REPO/releases/tags/$TAG" \
                   --jq ".assets[] | select(.name==\"$name\") | .id" 2>/dev/null || true)
            if [ -n "$id" ]; then
              echo "Deleting existing asset $name (id=$id)"
              gh api -X DELETE "repos/$REPO/releases/assets/$id"
            fi
          done
          gh release upload "$TAG" \
            MOSAIC-macOS-arm64/MOSAIC-macOS-arm64.zip \
            MOSAIC-Linux/MOSAIC-Linux.tar.gz \
            MOSAIC-Windows/MOSAIC-Windows.zip \
            --repo "$REPO"

  notify:
    name: Telegram announcement
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Send release announcement
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          TAG:                 ${{ github.ref_name }}
          REPO:                ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request

          token   = os.environ["TELEGRAM_BOT_TOKEN"]
          channel = os.environ["TELEGRAM_CHANNEL_ID"]
          gh_tok  = os.environ["GITHUB_TOKEN"]
          tag     = os.environ["TAG"]
          repo    = os.environ["REPO"]

          # Fetch the release that was just created
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/releases/tags/{tag}",
              headers={"Authorization": f"Bearer {gh_tok}",
                       "Accept": "application/vnd.github+json",
                       "X-GitHub-Api-Version": "2022-11-28"},
          )
          with urllib.request.urlopen(req) as resp:
              release = json.loads(resp.read())

          url  = release["html_url"]
          body = release.get("body", "").strip()

          MAX   = 900
          notes = body[:MAX] + ("…" if len(body) > MAX else "")
          notes = notes.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;")

          text = (
              f"🚀 <b>MOSAIC {tag} released!</b>\n\n"
              "<b>MOSAIC</b>\n"
              "<i>a vivid mosaic of open scientific literature, assembled in seconds</i>\n"
              "Multi-sOurce Scientific Article Indexer and Collector\n\n"
              f"<b>What's new:</b>\n{notes}\n\n"
              f'📦 <a href="https://pypi.org/project/mosaic-search/">PyPI</a>  ·  '
              f'🏷️ <a href="{url}">Release notes &amp; binaries</a>  ·  '
              f'📘 <a href="https://szaghi.github.io/mosaic/">Docs</a>\n\n'
              "<code>pipx install --upgrade mosaic-search</code>"
          )

          payload = {
              "chat_id": channel,
              "text": text,
              "parse_mode": "HTML",
              "link_preview_options": {"is_disabled": True},
          }
          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"},
          )
          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read())

          if not result.get("ok"):
              raise RuntimeError(f"Telegram API error: {result}")
          print(f"✓ sent message_id={result['result']['message_id']} to {channel}")
          EOF
