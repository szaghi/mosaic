name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:

jobs:

  # ── Job 1: tests + coverage ────────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: docs/public/coverage*.json
          retention-days: 7

  # ── Job 2: build & deploy VitePress docs to GitHub Pages ──────────────────
  deploy:
    name: Deploy Docs
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: docs/public/

      - name: Install VitePress dependencies
        run: npm ci
        working-directory: docs

      - name: Build VitePress site
        run: npm run docs:build
        working-directory: docs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ── Job 3: build & publish to PyPI (on version tags only) ─────────────────
  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      id-token: write   # required for Trusted Publisher (OIDC)

    environment:
      name: pypi
      url: https://pypi.org/project/mosaic-search/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build distribution
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
