name: PR title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  semantic-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            style
            test
            chore
            ci
            build
            revert
          requireScope: false
          subjectPattern: ^[a-z].+[^.]$
          subjectPatternError: |
            The PR subject must start with a lowercase letter and must not end with a period.
            Example: "feat(cli): add --json output flag"
